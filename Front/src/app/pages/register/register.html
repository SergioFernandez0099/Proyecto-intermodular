<div class="page-layout">
    <app-header></app-header>
        <main class="register-main">
    <div class="register--container">
      
      <div class="register--header">
        <h3>Create Account</h3>
      </div>

      <form class="register--form">
        <div class="form-row-flex">
          <div class="form-group flex-1">
            <label>{{'Register.nombre' | translate}}</label>
            <input type="text" placeholder="Jane">
          </div>
          <div class="form-group flex-1">
            <label>{{'Register.apellidos' | translate}}</label>
            <input type="text" placeholder="Doe">
          </div>
        </div>

        <div class="form-group">
          <label>{{'Register.email' | translate}}</label>
          <input type="email" placeholder="jane@example.com">
        </div>

        <div class="form-group">
          <label>{{'Register.password' | translate}}</label>
          <div class="input-wrapper">
            <input type="password" placeholder="••••••••">
            <span class="eye-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label>{{'Register.confirmar-password' | translate}}</label>
          <input type="password" placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary">{{'Register.boton-crear-cuenta' | translate}}</button>
      </form>

      <div class="register--footer">
        <p class="texto-crear">
          {{'Register.tienes-cuenta' | translate}}
          <a routerLink="/" class="link-create">{{'Register.login' | translate}}</a>
        </p>
      </div>

    </div>
  </main>

    <app-footer></app-footer>
</div>
